name: Generate cards PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate:
    name: Generate cards PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r cards/requirements.txt

      - name: Generate cards PDF
        run: |
          python cards/generate_cards.py cards/datasets/template.json --output cards/output/cards.pdf

      - name: Upload generated PDF
        uses: actions/upload-artifact@v4
        with:
          name: cards
          path: cards/output/cards.pdf
